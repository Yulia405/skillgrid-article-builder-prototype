            <div class="settings-radio ${b.spacing === 'md' ? 'active' : ''}" data-value="md">Средний</div>
            <div class="settings-radio ${b.spacing === 'lg' ? 'active' : ''}" data-value="lg">Большой</div>
          </div>
        </div>
      `;
    default:
      return '';
  }
}

function bindSettingsHandlers(block) {
  // Radio groups
  settingsPanel.querySelectorAll('.settings-radio-group').forEach(group => {
    const field = group.dataset.field;
    group.querySelectorAll('.settings-radio').forEach(radio => {
      radio.addEventListener('click', () => {
        group.querySelectorAll('.settings-radio').forEach(r => r.classList.remove('active'));
        radio.classList.add('active');
        let value = radio.dataset.value;
        if (!isNaN(parseFloat(value))) value = parseFloat(value);
        block[field] = value;
        renderArticle();
        // Для cover — живые лейблы в настройках (например "Затемнение 50%")
        if (block.type === 'cover' && field === 'darken') {
          const label = settingsPanel.querySelector('.settings-group label[class="settings-label"] span');
          if (label) label.textContent = block.darken + '%';
        }
        debouncedSave();
      });
    });
  });

  // Gradient palette (обложка)
  settingsPanel.querySelectorAll('.cover-gradient-palette').forEach(group => {
    const field = group.dataset.field;
    group.querySelectorAll('.gradient-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        group.querySelectorAll('.gradient-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        block[field] = sw.dataset.value;
        block.bgImage = null; // при выборе градиента сбрасываем фото
        renderArticle();
        debouncedSave();
      });
    });
  });

  // Cover background buttons в панели настроек
  const uploadBtn = settingsPanel.querySelector('[data-action="upload-bg-settings"], [data-action="replace-bg-settings"]');
  if (uploadBtn && block.type === 'cover') {
    uploadBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (e.target.closest('[data-action="remove-bg-settings"]')) return;
      triggerCoverUpload(block.id);
    });
  }

  const removeBtn = settingsPanel.querySelector('[data-action="remove-bg-settings"]');
  if (removeBtn && block.type === 'cover') {
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      block.bgImage = null;
      renderArticle();
      renderSettings();
      debouncedSave();
      toast('Фото-фон удалён');
    });
  }

  // Color swatches
  settingsPanel.querySelectorAll('.settings-colors').forEach(group => {
    const field = group.dataset.field;
    group.querySelectorAll('.color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        group.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        block[field] = sw.dataset.value;
        renderArticle();
        debouncedSave();
      });
    });
  });

  // Toggles
  settingsPanel.querySelectorAll('.toggle-switch').forEach(t => {
    t.addEventListener('click', () => {
      t.classList.toggle('active');
      const field = t.dataset.field;
      if (field) {
        block[field] = t.classList.contains('active');
        renderArticle();
        debouncedSave();
      }
    });
  });
}

// ============================================
// BLOCK PICKER POPOVER (кнопка "+" между блоками)
// ============================================
function showBlockPicker(anchor, insertIndex) {
  const existing = document.querySelector('.block-picker');
  if (existing) existing.remove();

  const picker = document.createElement('div');
  picker.className = 'block-picker';
  picker.style.cssText = `
    position: absolute;
    background: white;
    border: 1px solid var(--sg-border);
    border-radius: var(--sg-radius-md);
    box-shadow: var(--sg-shadow-xl);
    padding: 8px;
    z-index: 50;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    min-width: 280px;
  `;

  picker.innerHTML = Object.entries(BLOCK_META).map(([type, meta]) => `
    <button class="picker-item" data-type="${type}" style="
      padding: 10px 6px;
      border-radius: 8px;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--sg-text);
      transition: background 0.1s ease;
      cursor: pointer;
    ">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${meta.icon}</svg>
      ${meta.name}
    </button>
  `).join('');

  picker.querySelectorAll('.picker-item').forEach(btn => {
    btn.addEventListener('mouseenter', () => btn.style.background = 'var(--sg-bg)');
    btn.addEventListener('mouseleave', () => btn.style.background = 'transparent');
    btn.addEventListener('click', () => {
      addBlock(btn.dataset.type, insertIndex);
      picker.remove();
    });
  });

  document.body.appendChild(picker);
  const rect = anchor.getBoundingClientRect();
  picker.style.top = (rect.bottom + 8) + 'px';
  picker.style.left = (rect.left - 120) + 'px';

  // Close on click outside
  setTimeout(() => {
    document.addEventListener('click', function close(e) {
      if (!picker.contains(e.target)) {
        picker.remove();
        document.removeEventListener('click', close);
      }
    });
  }, 0);
}

// ============================================
// FLOATING TEXT TOOLBAR
// ============================================
const floatingToolbar = document.getElementById('floatingToolbar');
const ftColors = document.getElementById('ftColors');
let savedSelection = null;

function saveSelection() {
  const sel = window.getSelection();
  if (sel.rangeCount) savedSelection = sel.getRangeAt(0).cloneRange();
}

function restoreSelection() {
  if (savedSelection) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedSelection);
  }
}

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) {
    hideFloatingToolbar();
    return;
  }

  const range = sel.getRangeAt(0);
  const editableParent = range.commonAncestorContainer.nodeType === 1
    ? range.commonAncestorContainer.closest('[contenteditable="true"]')
    : range.commonAncestorContainer.parentElement.closest('[contenteditable="true"]');

  if (!editableParent) {
    hideFloatingToolbar();
    return;
  }

  // Показываем тулбар только для text/quote/callout/accordion-body
  const blockWrap = editableParent.closest('.article-block');
  if (!blockWrap) { hideFloatingToolbar(); return; }

  const rect = range.getBoundingClientRect();
  if (rect.width === 0 && rect.height === 0) { hideFloatingToolbar(); return; }

  floatingToolbar.classList.add('visible');
  const tbRect = floatingToolbar.getBoundingClientRect();
  let top = rect.top - tbRect.height - 8;
  let left = rect.left + rect.width / 2 - tbRect.width / 2;
  if (top < 8) top = rect.bottom + 8;
  if (left < 8) left = 8;
  if (left + tbRect.width > window.innerWidth - 8) left = window.innerWidth - tbRect.width - 8;

  floatingToolbar.style.top = top + 'px';
  floatingToolbar.style.left = left + 'px';

  // Update active states
  floatingToolbar.querySelectorAll('.ft-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    if (cmd && cmd !== 'createLink') {
      btn.classList.toggle('active', document.queryCommandState(cmd));
    }
  });

  saveSelection();
});

function hideFloatingToolbar() {
  floatingToolbar.classList.remove('visible');
  ftColors.classList.remove('visible');
}

floatingToolbar.querySelectorAll('.ft-btn[data-cmd]').forEach(btn => {
  btn.addEventListener('mousedown', e => e.preventDefault()); // keep selection
  btn.addEventListener('click', () => {
    const cmd = btn.dataset.cmd;
    restoreSelection();
    if (cmd === 'createLink') {
      const url = prompt('URL ссылки:', 'https://');
      if (url) document.execCommand('createLink', false, url);
    } else {
      document.execCommand(cmd, false, null);
    }
    // Update state model (простой способ — перечитать текущий блок)
    updateCurrentEditableToState();
  });
});

document.getElementById('ftColorBtn').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('ftColorBtn').addEventListener('click', () => {
  ftColors.classList.toggle('visible');
});

ftColors.querySelectorAll('.ft-color').forEach(c => {
  c.addEventListener('mousedown', e => e.preventDefault());
  c.addEventListener('click', () => {
    restoreSelection();
    document.execCommand('foreColor', false, c.dataset.color);
    ftColors.classList.remove('visible');
    updateCurrentEditableToState();
  });
});

function updateCurrentEditableToState() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const editable = range.commonAncestorContainer.nodeType === 1
    ? range.commonAncestorContainer.closest('[contenteditable="true"]')
    : range.commonAncestorContainer.parentElement?.closest('[contenteditable="true"]');
  if (!editable) return;

  const blockWrap = editable.closest('.article-block');
  if (!blockWrap) return;
  const block = state.blocks.find(b => b.id === blockWrap.dataset.blockId);
  if (!block) return;

  const field = editable.dataset.field;
  if (field === 'html') block.html = editable.innerHTML;

  debouncedSave();
}

// ============================================
// DEVICE / MODE SWITCHER
// ============================================
const canvas = document.getElementById('canvas');

document.querySelectorAll('.device-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const device = btn.dataset.device;
    canvas.classList.remove('device-desktop', 'device-tablet', 'device-mobile');
    canvas.classList.add('device-' + device);
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.mode === 'preview') {
      document.body.classList.add('preview-mode');
      canvas.classList.add('preview-active');
      hideFloatingToolbar();
    } else {
      document.body.classList.remove('preview-mode');
      canvas.classList.remove('preview-active');
    }
  });
});

// ============================================
// TEMPLATES (admin custom)
// ============================================
document.getElementById('saveAsTemplateBtn').addEventListener('click', () => {
  if (state.blocks.length === 0) {
    toast('Сначала добавьте блоки в статью');
    return;
  }
  showModal({
    title: 'Сохранить как шаблон',
    desc: 'Шаблон будет доступен всем редакторам вашей компании при создании статьи',
    placeholder: 'Например: «Еженедельный дайджест»',
    onOk: (name) => {
      if (!name) return;
      const tpl = {
        id: 't_' + Date.now(),
        name: name,
        desc: `${state.blocks.length} блок(ов)`,
        icon: '📄',
        blocks: JSON.parse(JSON.stringify(state.blocks))
      };
      state.templates.push(tpl);
      renderTemplates();
      toast(`Шаблон «${name}» создан`);
    }
  });
});

function applyTemplate(id) {
  const tpl = state.templates.find(t => t.id === id);
  if (!tpl) return;

  showModal({
    title: `Применить шаблон «${tpl.name}»?`,
    desc: 'Текущее содержимое статьи будет заменено. Это действие нельзя отменить.',
    confirmOnly: true,
    confirmText: 'Применить',
    onOk: () => {
      if (Array.isArray(tpl.blocks) && tpl.blocks.length > 0 && typeof tpl.blocks[0] === 'string') {
        // Старый формат: просто тип блоков
        state.blocks = tpl.blocks.map(type => BLOCK_DEFAULTS[type]());
      } else {
        // Полный формат: структуры с контентом
        state.blocks = JSON.parse(JSON.stringify(tpl.blocks));
        state.blocks.forEach(b => { b.id = uid(); if (b.items) b.items.forEach(i => i.id = uid()); });
      }
      state.selectedId = null;
      render();
      toast(`Применён шаблон «${tpl.name}»`);
    }
  });
}

function deleteTemplate(id) {
  const tpl = state.templates.find(t => t.id === id);
  if (!tpl) return;
  showModal({
    title: `Удалить шаблон «${tpl.name}»?`,
    desc: 'Шаблон будет удалён у всех редакторов вашей компании.',
    confirmOnly: true,
    confirmText: 'Удалить',
    danger: true,
    onOk: () => {
      state.templates = state.templates.filter(t => t.id !== id);
      renderTemplates();
      toast('Шаблон удалён');
    }
  });
}

// ============================================
// MODAL
// ============================================
const modal = document.getElementById('modal');
const modalInput = document.getElementById('modalInput');
let modalCallback = null;

function showModal({ title, desc, placeholder, onOk, confirmOnly, confirmText = 'Подтвердить', danger = false }) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  modalInput.style.display = confirmOnly ? 'none' : 'block';
  modalInput.placeholder = placeholder || '';
  modalInput.value = '';
  const okBtn = document.getElementById('modalOk');
  okBtn.textContent = confirmText;
  okBtn.classList.remove('btn-primary', 'btn-secondary');
  okBtn.classList.add(danger ? 'btn-secondary' : 'btn-primary');
  if (danger) okBtn.style.background = 'var(--sg-danger)', okBtn.style.color = 'white', okBtn.style.borderColor = 'var(--sg-danger)';
  else okBtn.style.cssText = '';

  modalCallback = onOk;
  modal.classList.add('visible');
  if (!confirmOnly) setTimeout(() => modalInput.focus(), 50);
}

document.getElementById('modalOk').addEventListener('click', () => {
  if (modalCallback) modalCallback(modalInput.value.trim());
  modal.classList.remove('visible');
});

document.getElementById('modalCancel').addEventListener('click', () => {
  modal.classList.remove('visible');
});

modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalOk').click();
  if (e.key === 'Escape') document.getElementById('modalCancel').click();
});

// ============================================
// AUTOSAVE INDICATOR
// ============================================
let saveTimer;
const saveStatus = document.getElementById('saveStatus');
const saveStatusText = document.getElementById('saveStatusText');

function markSaving() {
  saveStatus.classList.add('saving');
  saveStatusText.textContent = 'Сохраняется...';
}

function markSaved() {
  saveStatus.classList.remove('saving');
  saveStatusText.textContent = 'Сохранено';
}

function debouncedSave() {
  clearTimeout(saveTimer);
  markSaving();
  saveTimer = setTimeout(markSaved, 800);
}

// ============================================
// TOAST
// ============================================
function toast(text) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
    if (e.key === 'd' && state.selectedId) {
      e.preventDefault();
      handleBlockAction(state.selectedId, 'duplicate');
    }
  }
  if (e.key === 'Escape') {
    state.selectedId = null;
    renderArticle();
    renderSettings();
    hideFloatingToolbar();
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    // только если не в contenteditable
    if (state.selectedId && !document.activeElement.isContentEditable) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
        handleBlockAction(state.selectedId, 'delete');
      }
    }
  }
});

// ============================================
// INIT
// ============================================
render();

// Стартовое выделение первого блока
if (state.blocks.length > 0) {
  state.selectedId = state.blocks[0].id;
  renderArticle();
  renderSettings();
}

</script>
